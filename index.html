<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen pb-20 transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 backdrop-blur-md transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

                <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="font-bold text-lg tracking-tight text-slate-900 dark:text-white hidden sm:block">Enrico's Collection</span>
                <span class="font-bold text-lg tracking-tight text-slate-900 dark:text-white sm:hidden">Collection</span>
            </div>
            
            <div class="flex items-center gap-1 sm:gap-2">
                <div id="status-badge" class="hidden md:block px-3 py-1 bg-blue-50 dark:bg-slate-800 text-blue-600 dark:text-blue-400 rounded-full text-xs font-medium animate-pulse mr-2">
                    Syncing...
                </div>
                
                <button id="add-btn" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" title="Add Watch">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>

                <button id="sync-btn" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" title="Force Sync">
                    <svg id="sync-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>

                <a id="edit-btn" href="#" target="_blank" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500" title="Open Google Sheet">

                </a>

                <button id="theme-toggle" class="p-2 rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div id="dashboard" class="hidden mb-12 fade-in">
            <h2 class="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-4">Collection Analytics</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

                </div>
                <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-1">Fav Movement</p>
                    <p class="text-xl font-bold text-slate-700 dark:text-slate-200 truncate" id="stat-movement">-</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">
                    <p class="text-xs text-slate-500 dark:text-slate-400 mb-1">Latest Acquisition</p>
                    <p class="text-xl font-bold text-slate-700 dark:text-slate-200 truncate" id="stat-latest">-</p>
                </div>
            </div>
            <div class="bg-white dark:bg-slate-900 p-1 rounded-full shadow-sm flex h-4 overflow-hidden" id="brand-bar"></div>
            <div class="flex flex-wrap gap-4 mt-3 text-xs text-slate-500 dark:text-slate-400" id="brand-legend"></div>
        </div>

        <div class="max-w-xl mx-auto mb-10 flex gap-3 h-12">
            <div class="relative group shadow-lg rounded-full flex-1 h-full">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400 group-focus-within:text-blue-500 dark:group-focus-within:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" id="search-input" class="block w-full h-full pl-11 pr-4 border-none rounded-l-full rounded-r-full sm:rounded-r-none bg-white dark:bg-slate-800 dark:text-white dark:placeholder-slate-500 text-slate-700 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all outline-none" placeholder="Search..." disabled>
            </div>

            <div class="relative shadow-lg rounded-full w-1/3 min-w-[130px] h-full">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <svg class="h-4 w-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                <select id="sort-select" class="block w-full h-full pl-4 pr-8 border-none rounded-r-full rounded-l-full sm:rounded-l-none bg-white dark:bg-slate-800 dark:text-white text-slate-700 text-sm font-medium focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all outline-none cursor-pointer">
                    <option value="date-desc">Newest</option>
                    <option value="date-asc">Oldest</option>
                    <option value="brand-asc">Brand (A-Z)</option>
                    <option value="brand-desc">Brand (Z-A)</option>
                    <option value="size-asc">Size (Small)</option>
                    <option value="size-desc">Size (Large)</option>
                </select>
            </div>
        </div>

        <div id="loading-indicator" class="flex justify-center py-20">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-400 dark:border-slate-600"></div>
        </div>
        <div id="error-message" class="hidden text-center py-10 px-4">
            <p class="text-red-500 dark:text-red-400 font-bold mb-2">Connection Failed</p>
            <p class="text-sm text-slate-500 dark:text-slate-400" id="error-details">Could not connect to Google Sheets.</p>
        </div>
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden fade-in"></div>
        <div id="no-results" class="hidden text-center py-10 text-slate-400 dark:text-slate-500">No matching watches found.</div>
    </main>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto border border-slate-200 dark:border-slate-800">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center sticky top-0 bg-white/95 dark:bg-slate-900/95 z-10 backdrop-blur">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white">Add New Watch</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="add-form" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Brand</label><input type="text" name="Brand" required class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Model</label><input type="text" name="Model" required class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Reference</label><input type="text" name="Reference" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Case Size</label><input type="text" name="Case Size" placeholder="e.g. 40mm" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Movement</label><input type="text" name="Movement" placeholder="e.g. Automatic, Quartz" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Purchase Date</label><input type="date" name="Purchase Date" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Lug-To-Lug</label><input type="text" name="Lug-To-Lug" placeholder="e.g. 47mm" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                    <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Image URL</label><input type="url" name="ImageURL" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></div>
                </div>
                <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Notes</label><textarea name="Notes" rows="3" class="w-full px-3 py-2 border rounded-lg dark:bg-slate-800 dark:border-slate-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none"></textarea></div>
                <div id="form-error" class="hidden text-sm text-red-500 dark:text-red-400">Failed to add watch. Check URL and try again.</div>
                <div class="pt-4 flex justify-end">
                    <button type="submit" id="submit-watch-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors flex items-center">
                        <span id="submit-text">Add Watch</span>
                        <svg id="submit-spinner" class="animate-spin ml-2 h-4 w-4 hidden" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION: LINKS HARDCODED
        // ==========================================
        // IMPORTANT: Paste the URL from your newly deployed Google Apps Script Web App here
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwn7eYwJp64L_pCMU_AXF3_dfUl55D3Mp7iV_8Q-asB618ERCihFd4N_QYhe2Ga9PaI/exec"; 
        const EDIT_URL = "https://docs.google.com/spreadsheets/d/1c2o-pGvXUZFE-P9639cYjC36nHZHCypAQ6BCd9AA_Ag/edit?gid=0#gid=0";

        // --- GLOBAL VARIABLES ---
        let allWatches = [];
        let currentSort = 'date-desc';
        let isEditing = false;
        let editRowId = null;
        const IGNORE_KEYS = ['Brand', 'Model', 'Reference', 'ImageURL', 'Notes', 'row'];

        // --- DOM ELEMENTS ---
        const gallery = document.getElementById('gallery');
        const dashboard = document.getElementById('dashboard');
        const loadingIndicator = document.getElementById('loading-indicator');
        const searchInput = document.getElementById('search-input');
        const sortSelect = document.getElementById('sort-select');
        const statusBadge = document.getElementById('status-badge');
        const errorDetails = document.getElementById('error-details');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const syncBtn = document.getElementById('sync-btn');
        const syncIcon = document.getElementById('sync-icon');
        const editBtn = document.getElementById('edit-btn');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        
        // Modal Elements
        const addBtn = document.getElementById('add-btn');
        const addModal = document.getElementById('add-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const addForm = document.getElementById('add-form');
        const submitBtn = document.getElementById('submit-watch-btn');
        const submitText = document.getElementById('submit-text');
        const submitSpinner = document.getElementById('submit-spinner');
        const formError = document.getElementById('form-error');
        const modalTitle = addModal.querySelector('h3');

        const htmlElement = document.documentElement;

        // --- THEME LOGIC ---
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            enableDarkMode();
        } else {
            enableLightMode();
        }

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                enableLightMode(); localStorage.setItem('theme', 'light');
            } else {
                enableDarkMode(); localStorage.setItem('theme', 'dark');
            }
        });
        function enableDarkMode() { htmlElement.classList.add('dark'); moonIcon.classList.add('hidden'); sunIcon.classList.remove('hidden'); }
        function enableLightMode() { htmlElement.classList.remove('dark'); sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }

        // --- HELPER FUNCTIONS ---
        
        function processImage(url) {
            if (!url || url.trim() === '') return null;
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                const idMatch = cleanUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (idMatch && idMatch[1]) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w1000`;
            }
            return cleanUrl;
        }

        // Smart finder for Date
        function getWatchDate(watch) {
            return watch.PurchaseDate || watch.Date || watch['Date Acquired'] || watch['Purchase Date'] || watch['Acquired'] || '';
        }

        // Smart finder for Size (Handle Space "Case Size" vs "CaseSize")
        function getWatchSize(watch) {
            const val = watch['Case Size'] || watch['CaseSize'] || watch['Size'] || watch['Diameter'] || '0';
            return parseFloat(val) || 0; // Strip "mm" and return number
        }

        function getTimestamp(dateStr) {
            if (!dateStr) return 0;
            if (dateStr.includes('-')) return new Date(dateStr).getTime();
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if (parts.length === 3) return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime();
            }
            return new Date(dateStr).getTime();
        }

        function formatToISO(dateStr) {
            if (!dateStr) return '';
            
            // Handle ISO strings with time components, e.g. "2026-02-27T08:00:00.000Z"
            if (typeof dateStr === 'string' && dateStr.includes('T')) {
                dateStr = dateStr.split('T')[0];
            }
            
            if (dateStr.includes('-')) return dateStr;
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                if(parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            return dateStr;
        }

        // --- SORT LOGIC ---
        function sortCollection(watches, criteria) {
            return [...watches].sort((a, b) => {
                switch (criteria) {
                    case 'date-desc':
                        return getTimestamp(getWatchDate(b)) - getTimestamp(getWatchDate(a));
                    case 'date-asc':
                        return getTimestamp(getWatchDate(a)) - getTimestamp(getWatchDate(b));
                    case 'brand-asc':
                        return (a.Brand || '').localeCompare(b.Brand || '');
                    case 'brand-desc':
                        return (b.Brand || '').localeCompare(a.Brand || '');
                    case 'size-asc':
                        return getWatchSize(a) - getWatchSize(b);
                    case 'size-desc':
                        return getWatchSize(b) - getWatchSize(a);
                    default:
                        return 0;
                }
            });
        }

        // --- FETCH LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            if (EDIT_URL && !EDIT_URL.includes("PASTE")) editBtn.href = EDIT_URL;
            else editBtn.classList.add('hidden');
            fetchData();
        });

        syncBtn.addEventListener('click', () => {
            if(!APPS_SCRIPT_URL) {
                showError("Please set the APPS_SCRIPT_URL in your source code.");
                return;
            }
            syncIcon.classList.add('animate-spin');
            statusBadge.textContent = "Updating...";
            statusBadge.classList.remove('bg-green-50', 'text-green-600', 'dark:bg-green-900/30', 'dark:text-green-400', 'bg-red-50', 'text-red-600', 'dark:bg-red-900/30', 'dark:text-red-400');
            statusBadge.classList.add('bg-blue-50', 'text-blue-600', 'dark:bg-slate-800', 'dark:text-blue-400', 'animate-pulse');
            fetchData();
        });

        searchInput.addEventListener('input', (e) => {
            filterAndRender();
        });

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            filterAndRender();
        });

        // --- MODAL AND ACTION LOGIC ---
        addBtn.addEventListener('click', () => {
            isEditing = false;
            editRowId = null;
            modalTitle.textContent = "Add New Watch";
            submitText.textContent = "Add Watch";
            addForm.reset();
            
            addModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            formError.classList.add('hidden');
        });

        closeModalBtn.addEventListener('click', () => {
            addModal.classList.add('hidden');
            document.body.style.overflow = '';
        });

        addModal.addEventListener('click', (e) => {
            if (e.target === addModal) {
                addModal.classList.add('hidden');
                document.body.style.overflow = '';
            }
        });

        window.editWatch = (rowId) => {
            const watch = allWatches.find(w => w.row === rowId);
            if(!watch) return;
            
            isEditing = true;
            editRowId = rowId;
            modalTitle.textContent = "Edit Watch";
            submitText.textContent = "Save Changes";
            formError.classList.add('hidden');
            
            // Pre-fill form
            Object.keys(watch).forEach(key => {
                const input = addForm.elements[key];
                if(input) {
                   input.value = watch[key];
                }
            });
            // Try to set dates smartly since the key might mismatch
            const dateInput = addForm.elements['Purchase Date'];
            if(dateInput) {
               dateInput.value = formatToISO(getWatchDate(watch));
            }
            
            addModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.deleteWatch = async (rowId) => {
            if(!confirm("Are you sure you want to delete this watch? This action cannot be undone.")) return;
            
            if(!APPS_SCRIPT_URL) {
                showError("Cannot delete: APPS_SCRIPT_URL is not configured.");
                return;
            }
            
            statusBadge.textContent = "Deleting...";
            statusBadge.classList.replace('text-green-600', 'text-amber-600');
            statusBadge.classList.add('animate-pulse');
            
            try {
                const payload = { action: 'delete', row: rowId };
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                syncBtn.click();
            } catch(err) {
                showError("Failed to delete watch.");
            }
        };

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if(!APPS_SCRIPT_URL) {
                formError.textContent = "Cannot submit: APPS_SCRIPT_URL is not configured.";
                formError.classList.remove('hidden');
                return;
            }
            
            formError.classList.add('hidden');
            submitBtn.disabled = true;
            submitText.textContent = isEditing ? "Saving..." : "Adding...";
            submitSpinner.classList.remove('hidden');
            
            const formData = new FormData(addForm);
            const watchData = Object.fromEntries(formData.entries());
            
            try {
                const payload = {
                    action: isEditing ? 'edit' : 'add',
                    watch: watchData
                };
                if(isEditing) payload.row = editRowId;
                
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                addForm.reset();
                addModal.classList.add('hidden');
                document.body.style.overflow = '';
                
                syncBtn.click();
            } catch (err) {
                console.error("Submission Error", err);
                formError.textContent = "Failed to submit. Check logs.";
                formError.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = isEditing ? "Save Changes" : "Add Watch";
                submitSpinner.classList.add('hidden');
            }
        });

        async function fetchData() {
            if(!APPS_SCRIPT_URL) {
                showError("Please set the APPS_SCRIPT_URL in your index.html");
                syncIcon.classList.remove('animate-spin');
                return;
            }
            
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allWatches = data;
                    initializeSuccess();
                } else {
                    throw new Error("Invalid format received");
                }
            } catch(err) {
                showError(err.message);
                syncIcon.classList.remove('animate-spin');
            }
        }

        function initializeSuccess() {
            loadingIndicator.classList.add('hidden');
            gallery.classList.remove('hidden');
            dashboard.classList.remove('hidden');
            searchInput.disabled = false;
            statusBadge.textContent = "Live";
            statusBadge.classList.remove('animate-pulse', 'bg-blue-50', 'text-blue-600', 'dark:bg-slate-800', 'dark:text-blue-400');
            statusBadge.classList.add('bg-green-50', 'text-green-600', 'dark:bg-green-900/30', 'dark:text-green-400');
            
            // FORCE UI TO MATCH JS STATE
            sortSelect.value = currentSort;
            
            renderStats(allWatches);
            filterAndRender(); 
        }

        function filterAndRender() {
            const term = searchInput.value.toLowerCase();
            let filtered = allWatches.filter(watch => 
                Object.values(watch).some(val => String(val).toLowerCase().includes(term))
            );
            filtered = sortCollection(filtered, currentSort);
            renderCollection(filtered);
        }

        function renderStats(watches) {
            const chronWatches = sortCollection(watches, 'date-desc');
            document.getElementById('stat-total').textContent = watches.length;
            const brands = {}; const movements = {};
            watches.forEach(w => {
                const b = (w.Brand || 'Unknown').trim();
                const m = (w.Movement || 'Unknown').trim();
                brands[b] = (brands[b] || 0) + 1;
                movements[m] = (movements[m] || 0) + 1;
            });
            document.getElementById('stat-brand').textContent = Object.keys(brands).length ? Object.keys(brands).reduce((a, b) => brands[a] > brands[b] ? a : b) : '-';
            document.getElementById('stat-movement').textContent = Object.keys(movements).length ? Object.keys(movements).reduce((a, b) => movements[a] > movements[b] ? a : b) : '-';
            
            if(chronWatches[0]) {
                 const dateStr = getWatchDate(chronWatches[0]);
                 const t = getTimestamp(dateStr);
                 const d = new Date(t);
                 document.getElementById('stat-latest').textContent = isNaN(d.getFullYear()) ? '-' : d.getFullYear();
            }
            
            const barContainer = document.getElementById('brand-bar');
            const legendContainer = document.getElementById('brand-legend');
            barContainer.innerHTML = ''; legendContainer.innerHTML = '';
            const colors = ['bg-slate-800 dark:bg-slate-600', 'bg-blue-600 dark:bg-blue-500', 'bg-slate-500 dark:bg-slate-400', 'bg-blue-400 dark:bg-blue-300', 'bg-slate-300 dark:bg-slate-200'];
            let colorIndex = 0;
            Object.entries(brands).sort(([,a], [,b]) => b - a).forEach(([brand, count]) => {
                const percentage = (count / watches.length) * 100;
                const colorClass = colors[colorIndex % colors.length];
                const segment = document.createElement('div'); segment.className = `${colorClass} h-full`; segment.style.width = `${percentage}%`; barContainer.appendChild(segment);
                const legendItem = document.createElement('div'); legendItem.className = 'flex items-center gap-1'; legendItem.innerHTML = `<div class="w-2 h-2 rounded-full ${colorClass.split(' ')[0]}"></div><span>${brand} (${count})</span>`; legendContainer.appendChild(legendItem);
                colorIndex++;
            });
        }

        function renderCollection(watches) {
            if (watches.length === 0) {
                gallery.innerHTML = '';
                document.getElementById('no-results').classList.remove('hidden');
                return;
            }
            document.getElementById('no-results').classList.add('hidden');

            gallery.innerHTML = watches.map(watch => {
                const imageSrc = processImage(watch.ImageURL) || 'https://placehold.co/600x400/1e293b/475569?text=No+Image';
                const hasNotes = watch.Notes && watch.Notes.trim() !== '';
                const notesHtml = hasNotes ? `<div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800"><p class="text-sm text-slate-500 dark:text-slate-400 italic">"${watch.Notes}"</p></div>` : '';

                const rawDate = getWatchDate(watch);
                const displayDate = formatToISO(rawDate);
                
                let gridHtml = '';
                if (displayDate) {
                    gridHtml += `<div><span class="text-slate-400 dark:text-slate-500 block mb-0.5">Date Acquired</span><span class="font-medium text-slate-700 dark:text-slate-300">${displayDate}</span></div>`;
                }

                Object.keys(watch).forEach(key => {
                    if (IGNORE_KEYS.includes(key) || !watch[key] || watch[key].trim() === '') return;
                    if (key === 'PurchaseDate' || key === 'Date' || key === 'Date Acquired' || key === 'Purchase Date') return;
                    
                    gridHtml += `<div><span class="text-slate-400 dark:text-slate-500 block mb-0.5">${key}</span><span class="font-medium text-slate-700 dark:text-slate-300">${watch[key]}</span></div>`;
                });

                return `
                <div class="bg-white dark:bg-slate-900 rounded-xl overflow-hidden shadow-sm hover:shadow-xl dark:shadow-none dark:hover:bg-slate-850 transition-all duration-300 border border-slate-200 dark:border-slate-800 flex flex-col group relative">
                    <div class="absolute top-2 right-2 z-10 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-white/80 dark:bg-slate-900/80 backdrop-blur rounded-lg p-1 shadow-sm">
                        <button onclick="editWatch(${watch.row})" class="p-1.5 text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 transition-colors" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="deleteWatch(${watch.row})" class="p-1.5 text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 transition-colors" title="Delete">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    <div class="h-64 overflow-hidden bg-slate-100 dark:bg-slate-800 relative">
                        <img src="${imageSrc}" alt="${watch.Model}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="mb-2">
                            <h3 class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-widest mb-1">${watch.Brand || 'Unknown'}</h3>
                            <h2 class="text-xl font-bold text-slate-900 dark:text-white leading-tight">${watch.Model || 'Unknown'}</h2>
                            <p class="text-xs text-slate-400 dark:text-slate-500 mt-1 font-mono">${watch.Reference || ''}</p>
                        </div>
                        ${notesHtml}
                        <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-800 grid grid-cols-2 gap-2 text-xs">
                            ${gridHtml}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function showError(msg) {
            loadingIndicator.classList.add('hidden');
            document.getElementById('error-message').classList.remove('hidden');
            if(msg) errorDetails.textContent = msg;
            statusBadge.textContent = "Error";
            statusBadge.classList.remove('bg-blue-50', 'text-blue-600', 'dark:bg-slate-800', 'dark:text-blue-400');
            statusBadge.classList.add('bg-red-50', 'text-red-600', 'dark:bg-red-900/30', 'dark:text-red-400');
        }
    </script>
</body>
</html>
